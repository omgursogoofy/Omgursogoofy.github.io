<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Portrait Pastel Banner</title>
<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background-color: #F7F7F7; 
    overflow: hidden;
}

#app-container {
    position: fixed; 
    top: 45%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 100vw;
    max-width: 402px; 
    max-height: 100dvh;
    aspect-ratio: 1206 / 2622;
    background-color: #f5f5f5;
    background-image: url('https://i.imgur.com/HtsVY6D.jpeg');
    background-size: 100% 100%; 
    background-position: center;
    background-repeat: no-repeat;
    overflow: hidden;
    border-radius: 12px;
}

/* Positioned to match the center area in IMG_1055.jpg */
#image-slider {
    position: absolute;
    top: 17%;
    left: 23%;
    width: 56%;
    height: 38%;
    z-index: 1;
}

#image-slider img {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    opacity: 0;
    transition: opacity 0.5s ease-in-out;
}

#image-slider img.active {
    opacity: 1;
}

#wrap {
    position: absolute;
    top: 51%;
    left: 50%;
    transform: translateX(-50%);
    width: 85%;
    height: 6%;
    border-radius: 3cqw 3cqw 0 0;
    overflow: hidden;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    z-index: 2;
}

#grad { position: absolute; inset: 0; }
#gloss { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(255,255,255,.18), rgba(255,255,255,.05) 25%, transparent 55%); }
#shine { position: absolute; top: 0; bottom: 0; width: 35%; left: -40%; background: linear-gradient(90deg, transparent, rgba(255,255,255,.22), transparent); transform: skewX(-20deg); animation: shine 1.2s linear infinite; }
#flash { position: absolute; inset: 0; background: #fff; opacity: 0; animation: flash 1.2s ease-in-out infinite; }

#text {
    position: absolute;
    top: 50%;
    left: 0;
    color: #fff;
    font-size: 5.5cqw; 
    font-weight: 700;
    text-shadow: 0 1px 5px rgba(0, 0, 0, 0.8);
    white-space: nowrap;
    animation: slide 1.3s cubic-bezier(.42,0,.58,1) infinite alternate;
}

@keyframes slide { 0% { transform: translateY(-50%) translateX(2cqw); } 100% { transform: translateY(-50%) translateX(11cqw); } }
@keyframes shine { 0% { left: -45%; } 100% { left: 120%; } }
@keyframes flash { 0% { opacity: 0; } 50% { opacity: .6; } 100% { opacity: 0; } }
</style>
</head>
<body>

<div id="app-container">
    <div id="image-slider">
        <img src="https://i.imgur.com/ertbfWA.jpeg" class="active">
        <img src="https://i.imgur.com/TblJYVs.jpeg">
        <img src="https://i.imgur.com/MSSU6sX.jpeg">
    </div>
    
    <div id="wrap">
        <div id="grad"></div>
        <div id="gloss"></div>
        <div id="shine"></div>
        <div id="flash"></div>
        <div id="text">08:01:26 AM&nbsp;&nbsp;06/27/2026</div>
    </div>
</div>

<script>
let currentIndex = 0;
const images = document.querySelectorAll('#image-slider img');
setInterval(() => {
    images[currentIndex].classList.remove('active');
    currentIndex = (currentIndex + 1) % images.length;
    images[currentIndex].classList.add('active');
}, 2000);

function getRandomPastel() {
    const h = Math.floor(Math.random() * 360);
    const s = Math.floor(Math.random() * 30) + 50;
    const l = Math.floor(Math.random() * 10) + 80;
    return `hsl(${h}, ${s}%, ${l}%)`;
}

let color1 = getRandomPastel();
let color2 = getRandomPastel();
while (color2 === color1) { color2 = getRandomPastel(); }
let color3 = getRandomPastel();
while (color3 === color1 || color3 === color2) { color3 = getRandomPastel(); }

document.getElementById('grad').style.background = 
    `linear-gradient(to right, ${color1} 0%, ${color1} 33.33%, ${color2} 33.33%, ${color2} 66.66%, ${color3} 66.66%, ${color3} 100%)`;
</script>

</body>
</html>
